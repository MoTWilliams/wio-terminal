<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>🌟🦄🌈✨*𝘽𝙀𝙀𝙋*✨🌈🦄🌟</title>
        <style>
            .center {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 2rem;
                height: 100vh;
                width: 100vw;
            }

            .button {
                width: 90vw;
                aspect-ratio: 5/2;
                font-size: 15vw;
                color:blue
            }
        </style>
    </head>
    <body style="background-color:aqua; margin: 0;">
        <div class="center">
            <script>
                function requestBeep() {
                    fetch("/api/beep/wio", {method: "POST"});
                }

                function doBark() {
                    const bark = new Audio("/Dog.wav");
                    bark.play();
                }

                async function pollEvents() {
                    const response = await fetch("/api/pending_event");
                    const text = await response.text();

                    if (text.trim() === "bark") { doBark(); }
                }

                setInterval(pollEvents, 1000);
            </script>
            
            <button onclick="requestBeep()" class="button">
                ✨<i><b><b>BEEP</b></b></i>✨
            </button>

            
        </div>
    </body>
</html>
